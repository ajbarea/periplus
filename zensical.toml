[project]
site_name = "Periplus"
site_description = "An offline-first travel-itinerary planner you install to your phone. Fork it for your own multi-week trip."
site_author = "AJ Barea"
site_url = "https://ajbarea.github.io/periplus/"
repo_url = "https://github.com/ajbarea/periplus"
repo_name = "ajbarea/periplus"
copyright = "AJ Barea · 2026"
extra_css = [
  "stylesheets/variables.css",
  "stylesheets/base.css",
  "stylesheets/hero.css",
]

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav = [
  { "Home" = "index.md" },
  { "Features" = "features.md" },
  { "Install & Use" = "install.md" },
  { "Customize" = "customize.md" },
  { "Tech Notes" = "tech-notes.md" },
]

# ---------------------------------------------------------------------------
# Theme & Visuals
# ---------------------------------------------------------------------------
[project.theme]
name = "material"
language = "en"
icon.logo = "material/map-marker-path"
font.text = "Inter"
font.code = "JetBrains Mono"

features = [
    "content.code.copy",
    "content.code.annotate",
    "navigation.footer",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "search.suggest",
    "search.share",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
[project.plugins]
search = { engine = "disco" }
social = {}

# ---------------------------------------------------------------------------
# Social & Metadata
# ---------------------------------------------------------------------------
[project.extra]
generator = false

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ajbarea/periplus"
name = "Periplus on GitHub"
